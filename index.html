<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Modern UI</title>

<style>
:root {
  --main: #6c5ce7;
  --accent: #00cec9;
  --bg: #0f1226;
  --card: #1b1f3a;
  --text: #ffffff;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  font-family: system-ui;
  background: linear-gradient(120deg, #0f1226, #1b1f3a);
  color: var(--text);
}

/* 🔹 Preloader */
#preloader {
  position: fixed;
  inset: 0;
  background: var(--bg);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: hide 2s forwards;
}
.loader {
  width: 40px;
  height: 40px;
  border: 3px solid #333;
  border-top: 3px solid var(--accent);
  border-radius: 50%;
  animation: spin 1s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }
@keyframes hide { to { opacity: 0; visibility: hidden; } }

/* 🔹 Navbar */
nav {
  display: flex;
  justify-content: space-between;
  padding: 20px 10%;
}
nav a {
  margin-left: 20px;
  color: #aaa;
  text-decoration: none;
  position: relative;
  transition: .3s;
}
nav a:hover {
  color: white;
}
nav a::after {
  content: "";
  position: absolute;
  height: 2px;
  width: 0;
  background: var(--accent);
  left: 0;
  bottom: -4px;
  transition: .3s;
}
nav a:hover::after {
  width: 100%;
}

/* 🔹 Hero */
.hero {
  text-align: center;
  padding: 100px 20px;
}
.hero h1 {
  font-size: 48px;
  margin-bottom: 20px;
}
.hero p {
  color: #aaa;
  margin-bottom: 30px;
}

/* 🔹 Button */
.btn {
  padding: 12px 24px;
  border-radius: 30px;
  border: none;
  background: var(--main);
  color: white;
  cursor: pointer;
  transition: 0.3s;
  position: relative;
  overflow: hidden;
}
.btn:hover {
  background: var(--accent);
  transform: translateY(-2px);
}

/* ripple */
.btn:active::after {
  content: "";
  position: absolute;
  width: 120px;
  height: 120px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  transform: scale(0);
  animation: ripple .6s linear;
}
@keyframes ripple {
  to { transform: scale(3); opacity: 0; }
}

/* 🔹 Cards */
.cards {
  display: flex;
  gap: 20px;
  padding: 50px 10%;
  justify-content: center;
  flex-wrap: wrap;
}
.card {
  background: var(--card);
  padding: 20px;
  border-radius: 16px;
  width: 250px;
  transition: 0.3s;
  transform: translateY(40px);
  opacity: 0;
  animation: show .8s forwards;
}
.card:nth-child(2) { animation-delay: .2s; }
.card:nth-child(3) { animation-delay: .4s; }

.card:hover {
  transform: translateY(-10px) scale(1.03);
}
.card p {
  opacity: 0;
  transition: .3s;
}
.card:hover p {
  opacity: 1;
}

@keyframes show {
  to { transform: translateY(0); opacity: 1; }
}

/* 🔹 Moving element */
.line {
  width: 100px;
  height: 4px;
  background: var(--accent);
  margin: 40px auto;
  animation: move 3s infinite alternate;
}
@keyframes move {
  from { transform: translateX(-100px); }
  to { transform: translateX(100px); }
}

/* 🔹 Image hover */
.img-box {
  width: 300px;
  margin: 50px auto;
  position: relative;
  border-radius: 16px;
  overflow: hidden;
}
.img-box img {
  width: 100%;
  transition: .5s;
}
.img-box:hover img {
  transform: scale(1.1);
  filter: brightness(50%);
}
.img-text {
  position: absolute;
  inset: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  opacity: 0;
  transition: .5s;
}
.img-box:hover .img-text {
  opacity: 1;
}

/* 🔹 Loader dots */
.dots {
  text-align: center;
  margin: 40px;
}
.dots span {
  display: inline-block;
  width: 10px;
  height: 10px;
  background: var(--accent);
  border-radius: 50%;
  margin: 5px;
  animation: bounce 1s infinite;
}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce {
  50% { transform: translateY(-10px); }
}

/* 🔹 Burger */
.burger {
  width: 30px;
  cursor: pointer;
}
.burger div {
  height: 3px;
  background: white;
  margin: 6px 0;
  transition: .3s;
}
.burger:hover div:nth-child(1){
  transform: rotate(45deg) translate(5px,5px);
}
.burger:hover div:nth-child(2){
  opacity: 0;
}
.burger:hover div:nth-child(3){
  transform: rotate(-45deg) translate(6px,-6px);
}

</style>
</head>

<body>

<div id="preloader">
  <div class="loader"></div>
</div>

<nav>
  <div>LOGO</div>
  <div>
    <a href="#">Главная</a>
    <a href="#">Проект</a>
    <a href="#">Контакты</a>
  </div>
</nav>

<section class="hero">
  <h1>Красивые CSS-анимации</h1>
  <p>Современный UI с плавными эффектами</p>
  <button class="btn">Начать</button>
</section>

<div class="cards">
  <div class="card">
    <h3>Анимации</h3>
    <p>Плавные и аккуратные эффекты</p>
  </div>
  <div class="card">
    <h3>UI</h3>
    <p>Современный интерфейс</p>
  </div>
  <div class="card">
    <h3>Практика</h3>
    <p>Реальные навыки фронтенда</p>
  </div>
</div>

<div class="line"></div>

<div class="img-box">
  <img src="https://picsum.photos/400/250">
  <div class="img-text">Hover эффект</div>
</div>

<div class="dots">
  <span></span><span></span><span></span>
</div>

<div style="display:flex; justify-content:center;">
  <div class="burger">
    <div></div>
    <div></div>
    <div></div>
  </div>
</div>

</body>
</html>
